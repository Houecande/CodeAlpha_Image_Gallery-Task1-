<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Light & Grace — Image Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/CSS/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="g-header">
    <div>
      <p class="g-eyebrow">Image Gallery — CodeAlpha</p>
      <h1 class="g-title">Light <em>&amp;</em> Grace</h1>
    </div>
    <p class="g-count" id="count-label" aria-live="polite">24 works</p>
  </header>

  <!-- FILTERS -->
  <nav class="g-filters" id="filters" aria-label="Filter by category"></nav>

  <!-- GRID -->
  <main>
    <div class="masonry-grid" id="grid"></div>
    <p class="no-results" id="no-results" role="status">No images in this category.</p>
  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <div class="lb-progress-wrap" aria-hidden="true">
      <div class="lb-progress" id="lb-progress"></div>
    </div>

    <button class="lb-close" id="lb-close" aria-label="Close viewer">&#x2715;</button>

    <div class="lb-inner">
      <button class="lb-btn lb-prev" id="lb-prev" aria-label="Previous image">&#8249;</button>

      <div class="lb-img-wrap">
        <img class="lb-img" id="lb-img" src="" alt="" />
        <div class="lb-info">
          <div>
            <p class="lb-cat-label" id="lb-cat"></p>
            <p class="lb-title" id="lb-title"></p>
            <p class="lb-author" id="lb-author"></p>
          </div>
          <p class="lb-counter" id="lb-counter" aria-live="polite"></p>
        </div>
      </div>

      <button class="lb-btn lb-next" id="lb-next" aria-label="Next image">&#8250;</button>
    </div>

    <div class="keyboard-hint" aria-hidden="true">
      <span class="key-chip"><kbd>←</kbd><kbd>→</kbd> navigate</span>
      <span class="key-chip"><kbd>Esc</kbd> close</span>
    </div>
  </div>

  <script src="assets/JS/main.js"></script>
</body>
</html>
